syntax = "proto3";

package noxy.agent;

// AI agent → relay: route encrypted human-in-the-loop decisions to wallet devices.
service AgentService {
  rpc RouteDecision (RouteDecisionRequest) returns (DeliveryOutcome);
  rpc GetDecisionOutcome (GetDecisionOutcomeRequest) returns (GetDecisionOutcomeResponse);
  rpc GetQuota (GetQuotaRequest) returns (GetQuotaResponse);
  rpc GetIdentityDevices (GetIdentityDevicesRequest) returns (GetIdentityDevicesResponse);
}

message RouteDecisionRequest {
  string request_id = 1;
  bytes ciphertext = 2;
  uint32 ttl_seconds = 3;
  string target_device_id = 4;
  bytes kyber_ct = 5;
  bytes nonce = 6;
  string decision_id = 7;
}

enum DeliveryStatus {
  DELIVERED = 0;
  QUEUED = 1;
  NO_DEVICES = 2;
  REJECTED = 3;
  ERROR = 4;
}

message DeliveryOutcome {
  DeliveryStatus status = 1;
  string request_id = 2;
  string decision_id = 3;
}

enum DecisionOutcome {
  DECISION_OUTCOME_PENDING = 0;
  DECISION_OUTCOME_APPROVED = 1;
  DECISION_OUTCOME_REJECTED = 2;
  DECISION_OUTCOME_EXPIRED = 3;
}

message GetDecisionOutcomeRequest {
  string request_id = 1;
  string decision_id = 2;
  string identity_id = 3;
}

message GetDecisionOutcomeResponse {
  string request_id = 1;
  bool pending = 2;
  DecisionOutcome outcome = 3;
}

message GetQuotaRequest {
  string request_id = 1;
}

message GetQuotaResponse {
  string request_id = 1;
  string app_name = 2;
  uint64 quota_total = 3;
  uint64 quota_remaining = 4;
  QuotaStatus status = 5;
}

enum QuotaStatus {
  QUOTA_ACTIVE = 0;
  QUOTA_SUSPENDED = 1;
  QUOTA_DELETED = 2;
}

message GetIdentityDevicesRequest {
  string request_id = 1;
  string identity_id = 2;  // wallet address
}

message IdentityDevice {
  string device_id = 1;
  bytes public_key = 2;
  bytes pq_public_key = 3;
}

message GetIdentityDevicesResponse {
  string request_id = 1;
  repeated IdentityDevice devices = 2;
}
